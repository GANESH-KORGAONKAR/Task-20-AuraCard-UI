<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 20 : Aura Card</title>
    <link rel="shortcut icon" href="FavIcon/aura card ui icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="cards">
        <div class="card card1">
          <img
            src="https://i.pinimg.com/736x/09/52/3f/09523fa9795fc74836989905c806a117.jpg"
            alt=" Goku "
          />
          <h3>Saiyan Warrior</h3>
          <p>A fighter who lives for the next battle.</p>
        </div>

        <div class="card card2">
          <img
            src="https://i.pinimg.com/736x/42/c2/d6/42c2d65ad55ccd6c9c29d2f6f8ad614c.jpg"
            alt=" Sung Jin-woo "
          />
          <h3>Shadow Monarch</h3>
          <p>The hunter who became a king of shadows.</p>
        </div>

        <div class="card card3">
          <img
            src="https://i.pinimg.com/736x/d8/54/88/d85488830e0bccba52ac0c7ae942e50c.jpg"
            alt=" Itachi Uchiha "
          />
          <h3>The Silent Protector</h3>
          <p>A hero hidden in darkness.</p>
        </div>

        <!-- <div class="card">
          <img
            src="https://i.pinimg.com/736x/44/18/5b/44185b4c583ebb9b241c05a4c8a44e82.jpg"
            alt=" Levi Ackerman "
          />
          <h3>Humanity’s Strongest Soldier</h3>
          <p>
            Precision, discipline, absolute strength.
          </p>
        </div> -->

        <div class="card card4">
          <img
            src="https://i.pinimg.com/1200x/15/62/3e/15623e1c3e6697ca9c23d0fcef9ba98d.jpg"
            alt=" Monkey D. Luffy "
          />
          <h3>Future Pirate King</h3>
          <p>Freedom is the only rule he follows.</p>
        </div>

        <div class="card card5">
          <img
            src="https://i.pinimg.com/736x/62/f5/0c/62f50c15a8d62d40173663c60bdf9005.jpg"
            alt=" Satoru Gojo "
          />
          <h3>The Honored One</h3>
          <p>Infinity stands between him and defeat.</p>
        </div>
      </div>
    </main>

    <!-- AUDIO FILES -->
    <audio id="audio1" src="sounds/goku.mp3"></audio>
    <audio id="audio2" src="sounds/sung jinwoo.mp3"></audio>
    <audio id="audio3" src="sounds/Itachi.mp3"></audio>
    <audio id="audio4" src="sounds/luffy.mp3"></audio>
    <audio id="audio5" src="sounds/gojo.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
